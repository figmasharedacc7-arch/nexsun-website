<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="orangeSun" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.32" stop-color="#FF8939"/>
      <stop offset="0.69" stop-color="#FF6803"/>
      <stop offset="1" stop-color="#FF6600"/>
    </radialGradient>
    <radialGradient id="goldSun" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.51" stop-color="#D9B341"/>
