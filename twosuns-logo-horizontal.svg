<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="sunA" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE89A"/>
      <stop offset="40%" stop-color="#F6B707"/>
      <stop offset="80%" stop-color="#F4920B"/>
      <stop offset="100%" stop-color="#E95704"/>
    </radialGradient>
    <radialGradient id="sunB" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFB48E"/>
      <stop offset="55%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
  </defs>

  <!-- Two-sun mark, left side -->
  <circle cx="68" cy="80" r="48" fill="url(#sunA)"/>
  <circle cx="106" cy="106" r="28" fill="url(#sunB)" opacity="0.92"/>

  <!-- TwoSuns wordmark -->
  <text x="160" y="113" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="92" font-weight="900" fill="#163E64" letter-spacing="-3">Two<tspan fill="#E95704">Suns</tspan></text>
</svg>
